apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 25.21.0
    helm:
      releaseName: prometheus
      valuesObject:
        alertmanager:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        server:
          service:
            type: ClusterIP
            servicePort: 80
          persistentVolume:
            enabled: false
        extraScrapeConfigs: |
          - job_name: pushgateway
            honor_labels: true
            static_configs:
              - targets:
                  - prometheus-pushgateway.monitoring.svc.cluster.local:9091
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://community-charts.github.io/helm-charts
    chart: mlflow
    targetRevision: 1.6.2
    helm:
      releaseName: mlflow
      valuesObject:
        service:
          type: ClusterIP
          port: 5000


        auth:
          enabled: false


        postgresql:
          enabled: false


        extraEnvVars:
          AWS_ACCESS_KEY_ID: "minio"
          AWS_SECRET_ACCESS_KEY: "minio123"
          MLFLOW_S3_ENDPOINT_URL: "http://minio.application.svc.cluster.local:9000"


        extraArgs:
          backend-store-uri: "postgresql://admin:admin@mlflow-postgres-postgresql.application.svc.cluster.local:5432/mlflow"
          default-artifact-root: "s3://mlflow-artifacts"
          host: "0.0.0.0"
          port: "5000"


  destination:
    namespace: application
    server: https://kubernetes.default.svc


  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
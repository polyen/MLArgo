apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mlflow-postgres-postgresql
  namespace: application
spec:
  serviceName: mlflow-postgres-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-postgres-postgresql
  template:
    metadata:
      labels:
        app: mlflow-postgres-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
              name: tcp-postgresql
          env:
            - name: POSTGRES_USER
              value: mlflow
            - name: POSTGRES_PASSWORD
              value: mlflowpass
            - name: POSTGRES_DB
              value: mlflow
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 250m
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
